<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Message Status</title>
<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(17, 17, 17, 0.98);
  border-bottom: 3px solid #333;
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  box-sizing: border-box;
}

.datetime {
  font-size: 24px;
  font-weight: bold;
  color: #d8f6ff;
}

.version {
  font-size: 20px;
  color: #9aa3aa;
}

.page {
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px;
  box-sizing: border-box;
}

.header {
  text-align: center;
  margin-bottom: 22px;
}

.title {
  font-size: 52px;
  font-weight: bold;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 24px;
  color: #cfefff;
  line-height: 1.35;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.control-button {
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  font-size: 24px;
  font-weight: bold;
  padding: 14px 20px;
  cursor: pointer;
}

.status-line {
  min-height: 34px;
  text-align: center;
  font-size: 22px;
  color: #c7d6de;
  margin-bottom: 16px;
}

.table-wrap {
  overflow-x: auto;
  border: 4px solid #444;
  border-radius: 14px;
  background: #111;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1100px;
}

th, td {
  padding: 14px 16px;
  border-bottom: 2px solid #2b2b2b;
  text-align: left;
  vertical-align: top;
  font-size: 22px;
}

th {
  position: sticky;
  top: 0;
  background: #1c1c1c;
  color: #8fe8ff;
  font-size: 22px;
  z-index: 2;
}

tr:nth-child(even) td {
  background: #151515;
}

.subject-cell {
  font-weight: bold;
}

.muted {
  color: #7f8c94;
}

.state-pill {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  font-weight: bold;
  font-size: 18px;
  line-height: 1;
}

.state-no {
  background: #333;
  color: #aaa;
}

.state-yes {
  background: #4d7cff;
  color: white;
}

.state-archived {
  background: #7b4b4b;
  color: white;
}


.reply-button {
  border: none;
  border-radius: 999px;
  background: #6b4aa0;
  color: white;
  font-size: 18px;
  font-weight: bold;
  padding: 8px 12px;
  cursor: pointer;
}

.reply-button:hover,
.reply-button:focus {
  outline: 3px solid yellow;
  outline-offset: 3px;
}

.reply-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0, 0, 0, 0.86);
  padding: 28px;
  box-sizing: border-box;
}

.reply-modal.show {
  display: flex;
  align-items: center;
  justify-content: center;
}

.reply-modal-card {
  width: min(100%, 900px);
  max-height: 88vh;
  overflow-y: auto;
  background: #111;
  border: 4px solid #6b4aa0;
  border-radius: 16px;
  padding: 24px;
  box-sizing: border-box;
}

.reply-modal-title {
  font-size: 34px;
  font-weight: bold;
  color: #8fe8ff;
  margin-bottom: 12px;
}

.reply-modal-meta {
  font-size: 22px;
  color: #cfefff;
  margin-bottom: 18px;
  line-height: 1.35;
}

.reply-modal-body {
  white-space: pre-wrap;
  font-size: 28px;
  line-height: 1.4;
  background: #1a1a1a;
  border: 3px solid #444;
  border-radius: 12px;
  padding: 18px;
}

.reply-modal-close {
  margin-top: 18px;
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  font-size: 26px;
  font-weight: bold;
  padding: 14px 18px;
  cursor: pointer;
}

.help {
  margin-top: 18px;
  text-align: center;
  font-size: 20px;
  color: #b8c7cf;
  line-height: 1.4;
}
</style>
</head>
<body>
  <div class="top-bar">
    <div class="datetime" id="datetimeBar">Loading time…</div>
    <div class="version">Family Status v0.2</div>
  </div>

  <div class="page">
    <div class="header">
      <div class="title">Family Message Status</div>
      <div class="subtitle">This page shows message status only. It does not display message bodies.</div>
    </div>

    <div class="controls">
      <button class="control-button" id="refreshButton" type="button">REFRESH NOW</button>
    </div>

    <div class="status-line" id="statusLine">Loading messages…</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>From</th>
            <th>Subject</th>
            <th>Sent</th>
            <th>Opened</th>
            <th>Read</th>
            <th>Liked</th>
            <th>Reply</th>
            <th>Archived</th>
          </tr>
        </thead>
        <tbody id="statusTableBody">
        </tbody>
      </table>
    </div>

    <div class="help">
      Refresh this page to see the latest status updates.
    </div>
  </div>


  <div id="replyModal" class="reply-modal" role="dialog" aria-modal="true" aria-labelledby="replyModalTitle">
    <div class="reply-modal-card">
      <div id="replyModalTitle" class="reply-modal-title">Dad’s Reply</div>
      <div id="replyModalMeta" class="reply-modal-meta"></div>
      <div id="replyModalBody" class="reply-modal-body"></div>
      <button id="replyModalClose" class="reply-modal-close" type="button">CLOSE</button>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx3SW-bEYi1afCBaLfiy2k5jljwkiOvKziPdUGWPTOFSqtDOFkTuUdL7j0Kc3BHNUWS0g/exec";
const REFRESH_INTERVAL_MS = 5 * 60 * 1000;

const datetimeBar = document.getElementById("datetimeBar");
const refreshButton = document.getElementById("refreshButton");
const statusLine = document.getElementById("statusLine");
const tableBody = document.getElementById("statusTableBody");
const replyModal = document.getElementById("replyModal");
const replyModalTitle = document.getElementById("replyModalTitle");
const replyModalMeta = document.getElementById("replyModalMeta");
const replyModalBody = document.getElementById("replyModalBody");
const replyModalClose = document.getElementById("replyModalClose");

let currentMessages = [];

function updateDateTimeBar() {
  const now = new Date();
  const datePart = now.toLocaleDateString(undefined, {
    weekday: "short",
    month: "short",
    day: "numeric",
    year: "numeric"
  });
  const timePart = now.toLocaleTimeString(undefined, {
    hour: "numeric",
    minute: "2-digit"
  });
  datetimeBar.textContent = `${datePart}   ${timePart}`;
}

function formatDateTime(iso) {
  if (!iso) return '<span class="muted">—</span>';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '<span class="muted">—</span>';
  return d.toLocaleString(undefined, {
    month: "short",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function pillHtml(active, archived = false) {
  if (archived) {
    return '<span class="state-pill state-archived">YES</span>';
  }
  return active
    ? '<span class="state-pill state-yes">YES</span>'
    : '<span class="state-pill state-no">NO</span>';
}


function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function replyCellHtml(msg, index) {
  if (!msg.replied_at) {
    return pillHtml(false);
  }

  return `
    <button class="reply-button" type="button" data-reply-index="${index}">READ REPLY</button>
    <div style="margin-top:6px;">${formatDateTime(msg.replied_at)}</div>
  `;
}

function openReplyModal(msg) {
  replyModalTitle.textContent = "Dad’s Reply";
  replyModalMeta.innerHTML = `
    <div><strong>Original message from:</strong> ${escapeHtml(msg.from_name || 'Family')}</div>
    <div><strong>Subject:</strong> ${escapeHtml(msg.subject || '')}</div>
    <div><strong>Replied:</strong> ${formatDateTime(msg.replied_at)}</div>
  `;
  replyModalBody.textContent = msg.reply_body || "";
  replyModal.classList.add("show");
  replyModalClose.focus();
}

function closeReplyModal() {
  replyModal.classList.remove("show");
}

async function loadStatus() {
  statusLine.textContent = "Loading messages…";
  refreshButton.disabled = true;

  try {
    const response = await fetch(API_URL + "?action=list_status");
    const data = await response.json();

    if (!response.ok || !data.ok) {
      throw new Error((data && data.error) || "Load failed");
    }

    const messages = data.messages || [];
    currentMessages = messages;
    tableBody.innerHTML = "";

    if (!messages.length) {
      const tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="8" class="muted">No messages found.</td>';
      tableBody.appendChild(tr);
      statusLine.textContent = "No messages found.";
      return;
    }

    messages.forEach((msg, index) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${msg.from_name ? escapeHtml(msg.from_name) : '<span class="muted">Family</span>'}</td>
        <td class="subject-cell">${escapeHtml(msg.subject || '')}</td>
        <td>${formatDateTime(msg.created_at)}</td>
        <td>${msg.opened_at ? pillHtml(true) + '<div style="margin-top:6px;">' + formatDateTime(msg.opened_at) + '</div>' : pillHtml(false)}</td>
        <td>${msg.read_at ? pillHtml(true) + '<div style="margin-top:6px;">' + formatDateTime(msg.read_at) + '</div>' : pillHtml(false)}</td>
        <td>${msg.liked_at ? pillHtml(true) + '<div style="margin-top:6px;">' + formatDateTime(msg.liked_at) + '</div>' : pillHtml(false)}</td>
        <td>${replyCellHtml(msg, index)}</td>
        <td>${msg.archived_at ? pillHtml(true, true) + '<div style="margin-top:6px;">' + formatDateTime(msg.archived_at) + '</div>' : pillHtml(false)}</td>
      `;
      tableBody.appendChild(tr);
    });

    tableBody.querySelectorAll("[data-reply-index]").forEach(button => {
      button.addEventListener("click", () => {
        const index = Number(button.dataset.replyIndex || "0");
        const msg = currentMessages[index];
        if (msg) openReplyModal(msg);
      });
    });

    const now = new Date();
    statusLine.textContent = "Last refreshed " + now.toLocaleTimeString(undefined, {
      hour: "numeric",
      minute: "2-digit"
    });
  } catch (error) {
    console.error(error);
    statusLine.textContent = "Could not load message status.";
    tableBody.innerHTML = "";
    const tr = document.createElement("tr");
    tr.innerHTML = '<td colspan="8" class="muted">Error loading status.</td>';
    tableBody.appendChild(tr);
  } finally {
    refreshButton.disabled = false;
  }
}

replyModalClose.addEventListener("click", closeReplyModal);
replyModal.addEventListener("click", (event) => {
  if (event.target === replyModal) closeReplyModal();
});
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeReplyModal();
});

refreshButton.addEventListener("click", () => {
  loadStatus();
});

document.addEventListener("DOMContentLoaded", () => {
  updateDateTimeBar();
  setInterval(updateDateTimeBar, 1000);
  loadStatus();
  setInterval(loadStatus, REFRESH_INTERVAL_MS);
});
</script>
</body>
</html>
