<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Send a Message</title>
<style>
html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

.page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 28px;
  box-sizing: border-box;
}

.header {
  text-align: center;
  margin-bottom: 28px;
}

.title {
  font-size: 52px;
  font-weight: bold;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 24px;
  color: #cfefff;
  line-height: 1.35;
}

.form-card {
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 16px;
  padding: 28px;
  box-sizing: border-box;
}

.field {
  margin-bottom: 22px;
  text-align: left;
}

label {
  display: block;
  font-size: 28px;
  font-weight: bold;
  color: #8fe8ff;
  margin-bottom: 10px;
}

input[type="text"],
textarea {
  width: 100%;
  box-sizing: border-box;
  border: 4px solid #555;
  border-radius: 12px;
  background: #1b1b1b;
  color: white;
  font-family: Arial, sans-serif;
  font-size: 28px;
  padding: 18px;
  outline: none;
}

input[type="text"]:focus,
textarea:focus {
  border-color: yellow;
  background: #232323;
}

textarea {
  min-height: 260px;
  resize: vertical;
  line-height: 1.35;
}

.actions {
  margin-top: 10px;
}

.submit-button {
  width: 100%;
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  font-size: 34px;
  font-weight: bold;
  padding: 22px;
  cursor: pointer;
}

.submit-button:disabled {
  opacity: 0.65;
  cursor: not-allowed;
}

.status {
  margin-top: 18px;
  min-height: 58px;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  opacity: 0;
  transition: opacity 0.25s ease;
}

.status.show {
  opacity: 1;
}

.status.sending {
  background: #4a4300;
  color: #ffff66;
}

.status.sent {
  background: #003d1f;
  color: #00ff66;
}

.status.error {
  background: #4a0000;
  color: #ff8888;
}

.help {
  margin-top: 24px;
  font-size: 22px;
  color: #b8c7cf;
  text-align: center;
  line-height: 1.4;
}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="title">Send a Family Message</div>
    <div class="subtitle">Write a note that will appear on Dad’s TV message page.</div>
  </div>

  <div class="form-card">
    <form id="messageForm">
      <div class="field">
        <label for="fromName">From</label>
        <input type="text" id="fromName" name="from_name" placeholder="Your name">
      </div>

      <div class="field">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="Short subject" required>
      </div>

      <div class="field">
        <label for="body">Message</label>
        <textarea id="body" name="body" placeholder="Write your message here" required></textarea>
      </div>

      <div class="actions">
        <button class="submit-button" id="submitButton" type="submit">SEND MESSAGE</button>
      </div>

      <div id="status" class="status"></div>
    </form>

    <div class="help">
      Keep the subject short and the message easy to read on a TV screen.
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx3SW-bEYi1afCBaLfiy2k5jljwkiOvKziPdUGWPTOFSqtDOFkTuUdL7j0Kc3BHNUWS0g/exec";

const form = document.getElementById("messageForm");
const statusBox = document.getElementById("status");
const submitButton = document.getElementById("submitButton");

function showStatus(text, mode) {
  statusBox.textContent = text;
  statusBox.className = "status show " + mode;
}

function clearStatus() {
  statusBox.textContent = "";
  statusBox.className = "status";
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();
  clearStatus();

  const fromName = document.getElementById("fromName").value.trim();
  const subject = document.getElementById("subject").value.trim();
  const body = document.getElementById("body").value.trim();

  if (!subject || !body) {
    showStatus("Please fill in subject and message.", "error");
    return;
  }

  submitButton.disabled = true;
  showStatus("SENDING...", "sending");

  try {
    const formData = new URLSearchParams();
    formData.set("action", "add_message");
    formData.set("from_name", fromName);
    formData.set("subject", subject);
    formData.set("body", body);

    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
      },
      body: formData.toString()
    });

    const result = await response.json();

    if (!response.ok || !result.ok) {
      throw new Error(result && result.error ? result.error : "Send failed");
    }

    form.reset();
    showStatus("MESSAGE SENT ✓", "sent");
  } catch (error) {
    console.error(error);
    showStatus("ERROR SENDING MESSAGE", "error");
  } finally {
    submitButton.disabled = false;
  }
});
</script>
</body>
</html>
