<script>
const TEST_MODE = false;

const API_KEY = "AIzaSyDhn_iGCs_y-xrx6AvCUbyylLWntuwTaTI";
const PLAYLIST_ID = "PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi";
const WATCHED_STORAGE_KEY = "watchedYoutubeVideosDadFireTv";
const MESSAGES_API_URL = "https://script.google.com/macros/library/d/1E8HeN2iho18K4mvWW73zi8Dz2FR5U-ecyL_T4Sjhu8OtWyJ5sZAMs4M1/7";

let statusTimeout;
let cachedMessages = [];
let expandedMessageId = null;

const panel = document.getElementById("messagePanel");
const textarea = document.getElementById("messageBox");
const statusBox = document.getElementById("status");
const sendButton = document.getElementById("sendButton");

const playerPanel = document.getElementById("playerPanel");
const closeVideoButton = document.getElementById("closeVideoButton");
const playerHost = document.getElementById("youtube-player-host");

const familyMessagesButton = document.getElementById("familyMessagesButton");
const unreadBadge = document.getElementById("unreadBadge");
const messagesPanel = document.getElementById("messagesPanel");
const closeMessagesButton = document.getElementById("closeMessagesButton");
const messagesStatus = document.getElementById("messagesStatus");
const messagesList = document.getElementById("messagesList");

function updateUnreadBadge(messages) {
  const unreadCount = (messages || []).filter(msg => !msg.read_at).length;
  unreadBadge.textContent = String(unreadCount);
  unreadBadge.classList.toggle("hidden", unreadCount === 0);
}

function getWatchedVideos() {
  try {
    const raw = localStorage.getItem(WATCHED_STORAGE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch (e) {
    return {};
  }
}

function saveWatchedVideos(watchedMap) {
  try {
    localStorage.setItem(WATCHED_STORAGE_KEY, JSON.stringify(watchedMap));
  } catch (e) {
    console.error("Could not save watched videos", e);
  }
}

function markVideoWatched(videoId) {
  const watched = getWatchedVideos();
  watched[videoId] = true;
  saveWatchedVideos(watched);

  const btn = document.querySelector(`[data-video-id="${videoId}"]`);
  if (btn) btn.classList.add("watched");
}

function clearTextareaVisual() {
  textarea.classList.remove("active-box");
  panel.classList.remove("keep-textarea-active");
}

function setTextareaVisual() {
  textarea.classList.add("active-box");
  panel.classList.remove("keep-textarea-active");
}

function showStatus(text, mode) {
  statusBox.textContent = text;
  statusBox.className = "";
  statusBox.id = "status";
  statusBox.classList.add("show", mode);
}

function clearStatus() {
  statusBox.textContent = "";
  statusBox.className = "";
  statusBox.id = "status";
}

function handleSubmit(event) {
  event.preventDefault();

  const form = event.target;

  clearTimeout(statusTimeout);

  textarea.classList.remove("active-box");
  panel.classList.add("keep-textarea-active");

  sendButton.disabled = true;
  sendButton.blur();

  showStatus("SENDING...", "sending");

  if (TEST_MODE) {
    setTimeout(() => {
      form.reset();
      panel.classList.add("keep-textarea-active");
      showStatus("MESSAGE SENT ✓", "sent");
      sendButton.disabled = false;

      statusTimeout = setTimeout(() => {
        clearStatus();
        clearTextareaVisual();
      }, 5000);
    }, 900);
    return;
  }

  const data = new FormData(form);

  fetch(form.action, {
    method: form.method,
    body: data,
    headers: { 'Accept': 'application/json' }
  })
  .then((response) => {
    if (!response.ok) throw new Error("Send failed");
    form.reset();
    panel.classList.add("keep-textarea-active");
    showStatus("MESSAGE SENT ✓", "sent");
    sendButton.disabled = false;

    statusTimeout = setTimeout(() => {
      clearStatus();
      clearTextareaVisual();
    }, 5000);
  })
  .catch(() => {
    panel.classList.remove("keep-textarea-active");
    textarea.classList.add("active-box");
    showStatus("ERROR SENDING", "error");
    sendButton.disabled = false;
  });
}

async function fetchPlaylistVideos(playlistId, apiKey) {
  let nextPageToken = "";
  const videos = [];

  do {
    const url = new URL("https://www.googleapis.com/youtube/v3/playlistItems");
    url.searchParams.set("part", "snippet,status");
    url.searchParams.set("playlistId", playlistId);
    url.searchParams.set("maxResults", "50");
    url.searchParams.set("key", apiKey);

    if (nextPageToken) url.searchParams.set("pageToken", nextPageToken);

    const response = await fetch(url.toString());
    if (!response.ok) throw new Error(`YouTube API request failed: ${response.status}`);

    const data = await response.json();

    for (const item of data.items || []) {
      const title = item?.snippet?.title;
      const videoId = item?.snippet?.resourceId?.videoId;
      const privacyStatus = item?.status?.privacyStatus;

      if (!videoId) continue;
      if (privacyStatus === "private") continue;
      if (!title) continue;
      if (title.trim().toLowerCase() === "private video") continue;

      videos.push({ title, videoId });
    }

    nextPageToken = data.nextPageToken || "";
  } while (nextPageToken);

  return videos;
}

function destroyEmbeddedPlayer() {
  playerHost.innerHTML = "";
}

function showPlayerPanel() {
  playerPanel.classList.add("show");
  closeVideoButton.focus();
}

function hidePlayerPanel() {
  destroyEmbeddedPlayer();
  playerPanel.classList.remove("show");
}

function playEmbeddedVideo(videoId) {
  showPlayerPanel();
  destroyEmbeddedPlayer();
  markVideoWatched(videoId);

  const iframe = document.createElement("iframe");
  iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
  iframe.allowFullscreen = true;
  iframe.referrerPolicy = "strict-origin-when-cross-origin";

  const embedUrl = new URL(`https://www.youtube.com/embed/${videoId}`);
  embedUrl.searchParams.set("autoplay", "1");
  embedUrl.searchParams.set("playsinline", "1");
  embedUrl.searchParams.set("rel", "0");

  iframe.src = embedUrl.toString();
  playerHost.appendChild(iframe);
}

function formatDisplayDate(isoString) {
  if (!isoString) return "";
  const d = new Date(isoString);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleString();
}

function loadJsonp(baseUrl, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
    const script = document.createElement("script");
    const url = new URL(baseUrl);

    Object.entries(params).forEach(([key, value]) => {
      url.searchParams.set(key, value);
    });
    url.searchParams.set("callback", callbackName);

    let cleanedUp = false;

    function cleanup() {
      if (cleanedUp) return;
      cleanedUp = true;
      delete window[callbackName];
      script.remove();
    }

    window[callbackName] = function(data) {
      cleanup();
      resolve(data);
    };

    script.onerror = function() {
      cleanup();
      reject(new Error("JSONP load failed"));
    };

    script.src = url.toString();
    document.body.appendChild(script);

    setTimeout(() => {
      if (!cleanedUp) {
        cleanup();
        reject(new Error("JSONP timeout"));
      }
    }, 12000);
  });
}

function openMessagesPanel() {
  messagesPanel.classList.add("show");
  closeMessagesButton.focus();
  messagesPanel.scrollIntoView({ behavior: "auto", block: "start" });

  if (cachedMessages.length) {
    renderMessages(cachedMessages);
    refreshMessages();
  } else {
    loadMessages();
  }
}

function closeMessagesPanelFn() {
  messagesPanel.classList.remove("show");
  expandedMessageId = null;
  window.scrollTo({ top: 0, behavior: "auto" });
}

async function runMessageAction(action, id) {
  return loadJsonp(MESSAGES_API_URL, { action, id });
}

function findCachedMessage(id) {
  return cachedMessages.find(msg => msg.id === id);
}

function renderMessages(messages) {
  messagesList.innerHTML = "";
  updateUnreadBadge(messages);

  if (!messages || !messages.length) {
    messagesStatus.textContent = "No messages right now.";
    return;
  }

  messagesStatus.textContent = "";

  messages.forEach((msg) => {
    const row = document.createElement("div");
    row.className = "message-row";

    const summaryButton = document.createElement("button");
    summaryButton.className = "message-summary-button";
    if (msg.opened_at) summaryButton.classList.add("opened");
    if (msg.read_at) summaryButton.classList.add("read");
    summaryButton.type = "button";

    const summaryText = msg.from_name
      ? `${msg.from_name}: ${msg.subject}`
      : msg.subject;

    summaryButton.innerHTML = `<span class="message-summary-main">${summaryText}</span>`;

    summaryButton.addEventListener("click", async () => {
      expandedMessageId = msg.id;

      if (!msg.opened_at) {
        try {
          const result = await runMessageAction("mark_opened", msg.id);
          if (result.ok) {
            const cached = findCachedMessage(msg.id);
            if (cached) cached.opened_at = result.opened_at || new Date().toISOString();
          }
        } catch (e) {
          console.error(e);
        }
      }

      renderMessages(cachedMessages);
    });

    const readIndicator = document.createElement("div");
    readIndicator.className = "message-indicator" + (msg.read_at ? " read" : "");
    readIndicator.textContent = msg.read_at ? "☑" : "☐";

    const archiveButton = document.createElement("button");
    archiveButton.className = "message-archive-button";
    archiveButton.type = "button";
    archiveButton.textContent = "📥";
    archiveButton.setAttribute("aria-label", "Archive message");
    archiveButton.addEventListener("click", async () => {
      messagesStatus.textContent = "Archiving…";
      try {
        const result = await runMessageAction("archive_message", msg.id);
        if (!result.ok) {
          messagesStatus.textContent = "Could not archive message.";
          return;
        }

        cachedMessages = cachedMessages.filter(m => m.id !== msg.id);
        if (expandedMessageId === msg.id) expandedMessageId = null;
        messagesStatus.textContent = "";
        renderMessages(cachedMessages);
      } catch (e) {
        console.error(e);
        messagesStatus.textContent = "Could not archive message.";
      }
    });

    row.appendChild(summaryButton);
    row.appendChild(readIndicator);
    row.appendChild(archiveButton);

    messagesList.appendChild(row);

    if (expandedMessageId === msg.id) {
      const expanded = document.createElement("div");
      expanded.className = "message-expanded";

      const from = document.createElement("div");
      from.className = "message-expanded-from";
      from.textContent = "FROM: " + (msg.from_name || "Family");

      const subject = document.createElement("div");
      subject.className = "message-expanded-subject";
      subject.textContent = "SUBJECT: " + msg.subject;

      const date = document.createElement("div");
      date.className = "message-expanded-date";
      date.textContent = "SENT: " + formatDisplayDate(msg.created_at);

      const body = document.createElement("div");
      body.className = "message-expanded-body";
      body.textContent = msg.body;

      const actionRow = document.createElement("div");
      actionRow.className = "message-action-row";

      const readButton = document.createElement("button");
      readButton.className = "message-icon-button" + (msg.read_at ? " active" : "");
      readButton.type = "button";
      readButton.textContent = msg.read_at ? "☑" : "☐";
      readButton.setAttribute("aria-label", "Mark as read");
      readButton.addEventListener("click", async () => {
        messagesStatus.textContent = "Marking as read…";
        try {
          const result = await runMessageAction("mark_read", msg.id);
          if (!result.ok) {
            messagesStatus.textContent = "Could not mark message as read.";
            return;
          }

          const cached = findCachedMessage(msg.id);
          if (cached) cached.read_at = result.read_at || new Date().toISOString();

          expandedMessageId = null;
          messagesStatus.textContent = "";
          renderMessages(cachedMessages);
        } catch (e) {
          console.error(e);
          messagesStatus.textContent = "Could not mark message as read.";
        }
      });

      const likeButton = document.createElement("button");
      likeButton.className = "message-icon-button" + (msg.liked_at ? " active" : "");
      likeButton.type = "button";
      likeButton.textContent = "👍";
      likeButton.setAttribute("aria-label", "Like message");
      likeButton.addEventListener("click", async () => {
        messagesStatus.textContent = "Saving like…";
        try {
          const result = await runMessageAction("like_message", msg.id);
          if (!result.ok) {
            messagesStatus.textContent = "Could not like message.";
            return;
          }

          const cached = findCachedMessage(msg.id);
          if (cached) {
            cached.liked_at = result.liked_at || new Date().toISOString();
            cached.read_at = result.read_at || cached.read_at || new Date().toISOString();
            cached.opened_at = result.opened_at || cached.opened_at || new Date().toISOString();
          }

          expandedMessageId = null;
          messagesStatus.textContent = "";
          renderMessages(cachedMessages);
        } catch (e) {
          console.error(e);
          messagesStatus.textContent = "Could not like message.";
        }
      });

      const closeButton = document.createElement("button");
      closeButton.className = "message-icon-button secondary";
      closeButton.type = "button";
      closeButton.textContent = "⇕";
      closeButton.setAttribute("aria-label", "Collapse message");
      closeButton.addEventListener("click", () => {
        expandedMessageId = null;
        renderMessages(cachedMessages);
      });

      actionRow.appendChild(readButton);
      actionRow.appendChild(likeButton);
      actionRow.appendChild(closeButton);

      expanded.appendChild(from);
      expanded.appendChild(subject);
      expanded.appendChild(date);
      expanded.appendChild(body);
      expanded.appendChild(actionRow);

      messagesList.appendChild(expanded);
    }
  });
}

async function loadMessages() {
  messagesStatus.textContent = "Loading messages…";
  messagesList.innerHTML = "";

  try {
    const data = await loadJsonp(MESSAGES_API_URL, { action: "list" });
    if (!data || !data.ok) {
      messagesStatus.textContent = "Could not load messages.";
      return;
    }

    cachedMessages = data.messages || [];
    renderMessages(cachedMessages);
  } catch (e) {
    console.error(e);
    messagesStatus.textContent = "Could not load messages.";
  }
}

async function refreshMessages() {
  try {
    const data = await loadJsonp(MESSAGES_API_URL, { action: "list" });
    if (data && data.ok) {
      cachedMessages = data.messages || [];
      if (expandedMessageId && !cachedMessages.some(m => m.id === expandedMessageId)) {
        expandedMessageId = null;
      }
      renderMessages(cachedMessages);
    }
  } catch (e) {
    console.error(e);
    updateUnreadBadge(cachedMessages);
  }
}

async function preloadMessagesForBadge() {
  try {
    const data = await loadJsonp(MESSAGES_API_URL, { action: "list" });
    if (data && data.ok) {
      cachedMessages = data.messages || [];
      updateUnreadBadge(cachedMessages);
    } else {
      updateUnreadBadge([]);
    }
  } catch (e) {
    console.error(e);
    updateUnreadBadge([]);
  }
}

async function loadVideos() {
  const status = document.getElementById("ytStatus");
  const list = document.getElementById("ytList");
  const watched = getWatchedVideos();

  try {
    const videos = await fetchPlaylistVideos(PLAYLIST_ID, API_KEY);

    list.innerHTML = "";

    if (!videos.length) {
      status.textContent = "No videos found.";
      return;
    }

    videos.forEach((video) => {
      const btn = document.createElement("button");
      btn.className = "youtube-video-button";
      btn.textContent = video.title;
      btn.type = "button";
      btn.dataset.videoId = video.videoId;

      if (watched[video.videoId]) {
        btn.classList.add("watched");
      }

      btn.addEventListener("click", () => {
        playEmbeddedVideo(video.videoId);
      });

      list.appendChild(btn);
    });

    status.style.display = "none";
  } catch (e) {
    console.error(e);
    status.textContent = "Error loading videos";
  }
}

document.addEventListener("DOMContentLoaded", function() {
  textarea.addEventListener("focus", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  textarea.addEventListener("click", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  textarea.addEventListener("input", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  sendButton.addEventListener("focus", () => {
    clearTextareaVisual();
  });

  sendButton.addEventListener("mouseover", () => {
    clearTextareaVisual();
  });

  closeVideoButton.addEventListener("click", () => {
    hidePlayerPanel();
  });

  familyMessagesButton.addEventListener("click", () => {
    openMessagesPanel();
  });

  closeMessagesButton.addEventListener("click", () => {
    closeMessagesPanelFn();
  });

  loadVideos();
  preloadMessagesForBadge();
});
</script>
