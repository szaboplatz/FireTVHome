<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
html {
  scroll-behavior: smooth;
}

body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
}

/* TOP JUMP */
.top-jump-wrap {
  padding: 24px 40px 0 40px;
}

a.jump-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 28px 40px;
  font-size: 42px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 96px;
  text-align: center;
  box-sizing: border-box;
  background: #444444;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 24px 40px 40px 40px;
}

/* MAIN BUTTONS */
a.button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 120px;
  text-align: center;
  box-sizing: border-box;
}

/* MAIN BUTTON COLORS */
.container a.button:nth-of-type(1) { background: #1f77b4; }
.container a.button:nth-of-type(2) { background: #2ca02c; }
.container a.button:nth-of-type(3) { background: #d62728; }
.container a.button:nth-of-type(4) { background: #9467bd; }
.container a.button:nth-of-type(5) { background: #ff7f0e; }

/* PLAYER OVERLAY */
.player-panel {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0, 0, 0, 0.97);
  padding: 0;
  box-sizing: border-box;
  overflow-y: auto;
}

.player-panel.show {
  display: block;
}

/* VIDEO AT VERY TOP */
.player-frame-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
}

#youtube-player-host,
#youtube-player-host iframe {
  width: 100%;
  height: 100%;
}

#youtube-player-host iframe {
  border: 0;
  display: block;
}

/* CONTENT BELOW VIDEO */
.player-content {
  padding: 20px;
}

.player-title {
  font-size: 34px;
  margin: 20px 0;
  text-align: center;
}

.player-controls {
  display: flex;
  justify-content: center;
  gap: 18px;
  flex-wrap: wrap;
}

.player-close-button {
  padding: 24px 36px;
  font-size: 36px;
  color: white;
  background: #444444;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* YOUTUBE LIST */
.youtube-playlist-panel {
  grid-column: span 2;
  width: 100%;
  text-align: left;
}

.youtube-playlist-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.youtube-video-button {
  padding: 22px;
  font-size: 34px;
  background: #1f1f1f;
  color: white;
  border: 3px solid #666;
  border-radius: 12px;
  text-align: left;
}

/* MESSAGE PANEL */
.message-panel {
  grid-column: span 2;
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 12px;
  padding: 30px;
}

/* HIGHLIGHTS */
a.button:hover,
.player-close-button:hover {
  outline: 4px solid yellow;
}
</style>
</head>
<body>

<div class="top-jump-wrap">
  <a class="jump-button" href="#messagePanel">JUMP TO SEND MESSAGE</a>
</div>

<div class="container">
  <a class="button" href="#">MAIN PHOTOS LOOP</a>
  <a class="button" href="#">MAIN PHOTOS</a>
  <a class="button" href="#">LATEST PHOTOS</a>
  <a class="button" href="#">VIDEOS</a>
  <a class="button" href="#">YOUTUBE WRESTLING VIDEOS</a>

  <section id="playerPanel" class="player-panel">
    <div class="player-frame-wrap">
      <div id="youtube-player-host"></div>
    </div>

    <div class="player-content">
      <div id="playerTitle" class="player-title"></div>

      <div class="player-controls">
        <button id="closeVideoButton" class="player-close-button">CLOSE VIDEO</button>
      </div>
    </div>
  </section>

  <section id="playlistPanel" class="youtube-playlist-panel">
    <div id="ytList" class="youtube-playlist-list"></div>
  </section>

  <div class="message-panel" id="messagePanel">
    <textarea placeholder="Type or speak your message here"></textarea>
  </div>
</div>

<script>
const playerPanel = document.getElementById("playerPanel");
const playerHost = document.getElementById("youtube-player-host");
const playerTitle = document.getElementById("playerTitle");

function playEmbeddedVideo(id, title) {
  playerPanel.classList.add("show");
  playerTitle.textContent = title;

  playerHost.innerHTML = `
    <iframe
      src="https://www.youtube.com/embed/${id}?autoplay=1&playsinline=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  `;
}

document.getElementById("closeVideoButton").onclick = () => {
  playerPanel.classList.remove("show");
  playerHost.innerHTML = "";
};
</script>

</body>
</html>
