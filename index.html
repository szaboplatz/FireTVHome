<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
}

h1 {
  margin: 30px 0 10px 0;
  font-size: 42px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
}

/* BUTTONS */
a.button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 120px;
  text-align: center;
}

/* COLORS */
.container a.button:nth-child(1) { background: #1f77b4; }
.container a.button:nth-child(2) { background: #2ca02c; }
.container a.button:nth-child(3) { background: #d62728; }
.container a.button:nth-child(4) { background: #9467bd; }
.container a.button:nth-child(5) { background: #ff7f0e; }

/* YOUTUBE PLAYLIST PANEL */
.youtube-playlist-panel {
  grid-column: span 2;
  width: 100%;
  margin: 0;
}

.youtube-playlist-status {
  font-size: 30px;
  padding: 10px;
  text-align: center;
}

.youtube-playlist-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 34vh;
  overflow-y: auto;
}

.youtube-video-button {
  width: 100%;
  padding: 22px;
  font-size: 34px;
  background: #1f1f1f;
  color: white;
  border: 3px solid #666;
  border-radius: 12px;
  text-align: left;
  cursor: pointer;
}

/* MESSAGE PANEL */
.message-panel {
  grid-column: span 2;
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 12px;
  padding: 30px;
  text-align: left;
}

.message-title {
  color: #00bcd4;
  font-size: 42px;
  text-align: center;
  margin-bottom: 20px;
}

.message-help {
  font-size: 28px;
  text-align: center;
  margin-bottom: 25px;
}

/* TEXT AREA */
textarea {
  width: 100%;
  font-size: 42px;
  padding: 25px;
  border-radius: 12px;
  border: 4px solid #555;
  background: #111;
  color: white;
  min-height: 240px;
  outline: none;
}

/* ACTIVE TEXTBOX */
textarea:focus,
textarea.active-box,
.message-panel.keep-textarea-active textarea {
  font-size: 56px;
  border: 4px solid yellow;
}

/* SEND BUTTON */
.submit-button {
  margin-top: 25px;
  width: 100%;
  padding: 30px;
  font-size: 44px;
  background: #00bcd4;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* HIGHLIGHT */
a.button:hover,
.youtube-video-button:hover,
.submit-button:hover,
a.button:focus,
.youtube-video-button:focus,
.submit-button:focus {
  outline: 4px solid yellow;
}
</style>
</head>
<body>

<h1>Home</h1>

<div class="container">

<a class="button" href="#">DAK MAIN PHOTOS LOOP</a>
<a class="button" href="#">DAK MAIN PHOTOS</a>
<a class="button" href="#">DAK LATEST PHOTOS</a>
<a class="button" href="#">DAK VIDEOS</a>
<a class="button" href="https://www.youtube.com/playlist?list=PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi">YOUTUBE WRESTLING VIDEOS</a>

<!-- PLAYLIST SECTION -->
<section class="youtube-playlist-panel">
  <div id="ytStatus" class="youtube-playlist-status">Loading videos…</div>
  <div id="ytList" class="youtube-playlist-list"></div>
</section>

<!-- MESSAGE PANEL -->
<div class="message-panel">
  <div class="message-title">SEND MESSAGE</div>
  <div class="message-help">Click the box, then speak, then press SEND</div>

  <textarea placeholder="Type or speak here"></textarea>
  <button class="submit-button">SEND</button>
</div>

</div>

<script>
const API_KEY = "AIzaSyDz4YYsovruiRP8TgFTAZkpRbnIowELHd8";
const PLAYLIST_ID = "PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi";

async function loadVideos() {
  const status = document.getElementById("ytStatus");
  const list = document.getElementById("ytList");

  try {
    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${PLAYLIST_ID}&maxResults=12&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    list.innerHTML = "";

    data.items.forEach(item => {
      const title = item.snippet.title;
      const id = item.snippet.resourceId.videoId;

      const btn = document.createElement("button");
      btn.className = "youtube-video-button";
      btn.textContent = title;

      btn.onclick = () => {
        window.location.href = `https://www.youtube.com/watch?v=${id}`;
      };

      list.appendChild(btn);
    });

    status.style.display = "none";
  } catch (e) {
    status.textContent = "Error loading videos";
  }
}

loadVideos();
</script>

</body>
</html>
