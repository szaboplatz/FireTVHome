<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
}

h1 {
  margin: 30px 0 10px 0;
  font-size: 42px;
}

/* MAIN GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
}

/* LINK BUTTONS */
a.button {
  display: block;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 120px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

/* HIGH-CONTRAST COLORS */
.container a.button:nth-child(1) { background: #1f77b4; } /* blue */
.container a.button:nth-child(2) { background: #2ca02c; } /* green */
.container a.button:nth-child(3) { background: #d62728; } /* red */
.container a.button:nth-child(4) { background: #9467bd; } /* purple */
.container a.button:nth-child(5) { background: #ff7f0e; } /* orange */

/* MESSAGE PANEL */
.message-panel {
  grid-column: span 2;
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 12px;
  padding: 30px;
  text-align: left;
}

.message-title {
  color: #00bcd4;
  font-size: 42px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 20px;
}

.message-help {
  color: white;
  font-size: 28px;
  line-height: 1.3;
  text-align: center;
  margin-bottom: 25px;
}

textarea {
  width: 100%;
  box-sizing: border-box;
  font-size: 36px;
  padding: 20px;
  border-radius: 12px;
  border: none;
  min-height: 220px;
  resize: vertical;
  font-family: Arial, sans-serif;
}

.submit-button {
  margin-top: 25px;
  width: 100%;
  padding: 30px;
  font-size: 44px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  cursor: pointer;
}

/* FOCUS / HOVER */
a.button:hover,
a.button:focus,
textarea:focus,
.submit-button:hover,
.submit-button:focus {
  outline: 4px solid yellow;
  outline-offset: 2px;
  filter: brightness(1.1);
}

/* Slightly larger touch targets on narrower screens */
@media (max-width: 900px) {
  .container {
    gap: 24px;
    padding: 24px;
  }

  a.button {
    font-size: 40px;
    padding: 28px;
    min-height: 100px;
  }

  .message-title {
    font-size: 34px;
  }

  .message-help {
    font-size: 24px;
  }

  textarea {
    font-size: 30px;
    min-height: 180px;
  }

  .submit-button {
    font-size: 38px;
  }
}
</style>
</head>
<body>

<h1>Home</h1>

<div class="container">
  <a class="button" href="https://dakboard.com/loop/uuid/69dcebfb-14e487-873c-fa42eb9f9f65">DAK MAIN PHOTOS LOOP</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dacf8a-14e487-cb76-551d2767950e">DAK MAIN PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dcf7fb-14e487-d0d9-b46b5725b21e">DAK LATEST PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dd4317-14e487-7750-c0bfa2942983">DAK VIDEOS</a>
  <a class="button" href="https://www.youtube.com/playlist?list=PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi">DAK WRESTLING VIDEOS</a>

  <div class="message-panel">
    <div class="message-title">SEND MESSAGE</div>
    <div class="message-help">Click in the box, then speak or type your message.</div>

    <form action="https://formspree.io/f/mzdyzybe" method="POST">
      <textarea name="message" placeholder="Type your message here" required></textarea>

      <!-- Optional but useful hidden subject line -->
      <input type="hidden" name="_subject" value="Message from Dad's Fire TV homepage">

      <button class="submit-button" type="submit">SEND</button>
    </form>
  </div>
</div>

</body>
</html>
