<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 24px 40px 40px 40px;
}

button.button-tile, a.button, a.jump-button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  font-size: 50px;
  border-radius: 12px;
  min-height: 120px;
  cursor: pointer;
  text-decoration: none;
  color: white;
  border: none;
}

#familyMessagesButton { background: #00a6c7; position: relative; }

.unread-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: red;
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 24px;
}

.messages-panel {
  display: none;
  grid-column: span 2;
}

.messages-panel.show { display: block; }

.messages-title {
  font-size: 52px;
  margin-bottom: 20px;
}

.messages-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.message-row {
  display: grid;
  grid-template-columns: 1fr 90px 90px;
  gap: 12px;
}

.message-summary {
  font-size: 32px;
  padding: 20px;
  border-radius: 12px;
  border: 4px solid #4fc46a;
  background: #1f6f2a;
  text-align: left;
}

.message-summary.opened { background: #254764; }
.message-summary.read { background: #333; }

.read-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  border-radius: 12px;
  background: #111;
  color: #666;
}

.read-indicator.read {
  background: #00bcd4;
  color: white;
}

.archive-btn {
  font-size: 34px;
  border-radius: 12px;
  background: #555;
}

.message-expanded {
  margin-top: 10px;
  padding: 20px;
  border: 4px solid #777;
  border-radius: 12px;
  background: #111;
  text-align: left;
}

.message-expanded div {
  font-size: 36px;
  margin-bottom: 12px;
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.action-btn {
  padding: 18px;
  font-size: 34px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.read-btn { background: #00bcd4; color: black; }
.like-btn { background: #ffaa00; color: black; }
.close-btn { background: #666; color: white; }

</style>
</head>

<body>

<div class="container">
  <button id="familyMessagesButton">FAMILY MESSAGES <span id="badge" class="unread-badge"></span></button>

  <section id="messagesPanel" class="messages-panel">
    <div class="messages-title">FAMILY MESSAGES</div>
    <div id="messagesList" class="messages-list"></div>
  </section>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx3SW-bEYi1afCBaLfiy2k5jljwkiOvKziPdUGWPTOFSqtDOFkTuUdL7j0Kc3BHNUWS0g/exec";

let messages = [];
let expanded = null;

async function loadMessages() {
  const res = await fetch(API + "?action=list");
  const data = await res.json();
  messages = data.messages || [];
  render();
}

function render() {
  const list = document.getElementById("messagesList");
  list.innerHTML = "";

  messages.forEach(msg => {
    const row = document.createElement("div");
    row.className = "message-row";

    const summary = document.createElement("div");
    summary.className = "message-summary";
    if (msg.opened_at) summary.classList.add("opened");
    if (msg.read_at) summary.classList.add("read");

    summary.innerHTML = `<b>FROM:</b> ${msg.from_name || "Family"}<br><b>SUBJECT:</b> ${msg.subject}`;

    summary.onclick = async () => {
      expanded = msg.id;
      if (!msg.opened_at) await fetch(API + "?action=mark_opened&id=" + msg.id);
      loadMessages();
    };

    const read = document.createElement("div");
    read.className = "read-indicator" + (msg.read_at ? " read" : "");
    read.innerHTML = "✓";

    const archive = document.createElement("button");
    archive.className = "archive-btn";
    archive.innerHTML = "📥";
    archive.onclick = async () => {
      await fetch(API + "?action=archive_message&id=" + msg.id);
      loadMessages();
    };

    row.appendChild(summary);
    row.appendChild(read);
    row.appendChild(archive);
    list.appendChild(row);

    if (expanded === msg.id) {
      const exp = document.createElement("div");
      exp.className = "message-expanded";

      exp.innerHTML = `
        <div><b>FROM:</b> ${msg.from_name}</div>
        <div><b>SUBJECT:</b> ${msg.subject}</div>
        <div><b>BODY:</b> ${msg.body}</div>
      `;

      const actions = document.createElement("div");
      actions.className = "action-row";

      const readBtn = document.createElement("button");
      readBtn.className = "action-btn read-btn";
      readBtn.innerHTML = "✓ READ";
      readBtn.onclick = async () => {
        await fetch(API + "?action=mark_read&id=" + msg.id);
        expanded = null;
        loadMessages();
      };

      const likeBtn = document.createElement("button");
      likeBtn.className = "action-btn like-btn";
      likeBtn.innerHTML = "👍 LIKE";
      likeBtn.onclick = async () => {
        await fetch(API + "?action=like_message&id=" + msg.id);
        expanded = null;
        loadMessages();
      };

      const closeBtn = document.createElement("button");
      closeBtn.className = "action-btn close-btn";
      closeBtn.innerHTML = "CLOSE";
      closeBtn.onclick = () => {
        expanded = null;
        render();
      };

      actions.appendChild(readBtn);
      actions.appendChild(likeBtn);
      actions.appendChild(closeBtn);
      exp.appendChild(actions);

      list.appendChild(exp);
    }
  });
}

document.getElementById("familyMessagesButton").onclick = () => {
  document.getElementById("messagesPanel").classList.toggle("show");
  loadMessages();
};

loadMessages();
</script>

</body>
</html>
