/* BUTTONS */
a {
  display: block;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
}

/* DIFFERENT COLORS (high contrast) */
a:nth-child(1) { background: #1f77b4; } /* blue */
a:nth-child(2) { background: #2ca02c; } /* green */
a:nth-child(3) { background: #d62728; } /* red */
a:nth-child(4) { background: #9467bd; } /* purple */
a:nth-child(5) { background: #ff7f0e; } /* orange */

/* HOVER / FOCUS */
a:hover,
a:focus {
  outline: 4px solid yellow;
  filter: brightness(1.2);
}
