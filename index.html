<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
}

h1 {
  margin: 30px 0 10px 0;
  font-size: 42px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
}

/* BUTTONS */
a.button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 120px;
  text-align: center;
}

/* COLORS */
.container a.button:nth-child(1) { background: #1f77b4; }
.container a.button:nth-child(2) { background: #2ca02c; }
.container a.button:nth-child(3) { background: #d62728; }
.container a.button:nth-child(4) { background: #9467bd; }
.container a.button:nth-child(5) { background: #ff7f0e; }

/* MESSAGE PANEL */
.message-panel {
  grid-column: span 2;
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 12px;
  padding: 30px;
  text-align: left;
}

.message-title {
  color: #00bcd4;
  font-size: 42px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 20px;
}

.message-help {
  color: white;
  font-size: 28px;
  text-align: center;
  margin-bottom: 25px;
}

/* TEXT AREA */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-size: 42px;
  line-height: 1.3;
  padding: 25px;
  border-radius: 12px;
  border: 4px solid #555;
  background: #111;
  color: white;
  min-height: 240px;
  resize: vertical;
  font-family: Arial, sans-serif;
  font-weight: 500;
  outline: none;
  transition: font-size 0.15s ease, min-height 0.15s ease, border-color 0.15s ease, background 0.15s ease;
}

/* Text box active state */
textarea:focus,
textarea.active-box,
.message-panel.keep-textarea-active textarea {
  font-size: 56px;
  min-height: 300px;
  background: #222;
  color: white;
  font-weight: 900;
  border: 4px solid yellow;
}

textarea::placeholder {
  color: #bbb;
}

/* SEND BUTTON */
.submit-button {
  margin-top: 25px;
  width: 100%;
  padding: 30px;
  font-size: 44px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  cursor: pointer;
  outline: none;
}

.submit-button:disabled {
  opacity: 0.6;
}

/* Yellow outline only for links and send button */
a.button:hover,
a.button:focus,
.submit-button:hover,
.submit-button:focus {
  outline: 4px solid yellow;
  outline-offset: 2px;
  filter: brightness(1.1);
}

/* STATUS above button */
#status {
  text-align: center;
  font-size: 40px;
  margin-top: 10px;
  margin-bottom: 20px;
  min-height: 56px;
  font-weight: bold;
  opacity: 0;
  transition: opacity 0.35s ease;
  border-radius: 12px;
  padding: 12px 16px;
}

#status.show {
  opacity: 1;
}

#status.sending {
  background: #4a4300;
  color: #ffff66;
}

#status.sent {
  background: #003d1f;
  color: #00ff66;
}

#status.error {
  background: #4a0000;
  color: #ff6666;
}
</style>
</head>
<body>

<h1>Home</h1>

<div class="container">
  <a class="button" href="https://dakboard.com/loop/uuid/69dcebfb-14e487-873c-fa42eb9f9f65">DAK MAIN PHOTOS LOOP</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dacf8a-14e487-cb76-551d2767950e">DAK MAIN PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dcf7fb-14e487-d0d9-b46b5725b21e">DAK LATEST PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dd4317-14e487-7750-c0bfa2942983">DAK VIDEOS</a>
  <a class="button" href="https://www.youtube.com/playlist?list=PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi">YOUTUBE WRESTLING VIDEOS</a>

  <div class="message-panel" id="messagePanel">
    <div class="message-title">SEND MESSAGE</div>
    <div class="message-help">Click the box, then hold the mic button and speak. When finished, press SEND.</div>

    <form action="https://formspree.io/f/mzdyzybe" method="POST" onsubmit="handleSubmit(event)">
      <textarea name="message" id="messageBox" placeholder="Type or speak your message here" required></textarea>

      <input type="hidden" name="_subject" value="Message from Dad's Fire TV">

      <div id="status"></div>

      <button class="submit-button" id="sendButton" type="submit">SEND</button>
    </form>
  </div>
</div>

<script>
const TEST_MODE = true; // set to false later for real sending

let statusTimeout;
const panel = document.getElementById("messagePanel");
const textarea = document.getElementById("messageBox");
const statusBox = document.getElementById("status");
const sendButton = document.getElementById("sendButton");

function clearTextareaVisual() {
  textarea.classList.remove("active-box");
  panel.classList.remove("keep-textarea-active");
}

function setTextareaVisual() {
  textarea.classList.add("active-box");
  panel.classList.remove("keep-textarea-active");
}

function showStatus(text, mode) {
  statusBox.textContent = text;
  statusBox.className = "";
  statusBox.id = "status";
  statusBox.classList.add("show", mode);
}

function clearStatus() {
  statusBox.textContent = "";
  statusBox.className = "";
  statusBox.id = "status";
}

function handleSubmit(event) {
  event.preventDefault();

  const form = event.target;

  clearTimeout(statusTimeout);

  // Only keep textbox highlighted during send, not whole panel
  textarea.classList.remove("active-box");
  panel.classList.add("keep-textarea-active");

  sendButton.disabled = true;
  sendButton.blur();

  showStatus("SENDING...", "sending");

  if (TEST_MODE) {
    setTimeout(() => {
      form.reset();
      panel.classList.add("keep-textarea-active");
      showStatus("MESSAGE SENT ✓", "sent");
      sendButton.disabled = false;

      statusTimeout = setTimeout(() => {
        clearStatus();
        clearTextareaVisual();
      }, 5000);
    }, 900);
    return;
  }

  const data = new FormData(form);

  fetch(form.action, {
    method: form.method,
    body: data,
    headers: { 'Accept': 'application/json' }
  })
  .then((response) => {
    if (!response.ok) throw new Error("Send failed");
    form.reset();
    panel.classList.add("keep-textarea-active");
    showStatus("MESSAGE SENT ✓", "sent");
    sendButton.disabled = false;

    statusTimeout = setTimeout(() => {
      clearStatus();
      clearTextareaVisual();
    }, 5000);
  })
  .catch(() => {
    panel.classList.remove("keep-textarea-active");
    textarea.classList.add("active-box");
    showStatus("ERROR SENDING", "error");
    sendButton.disabled = false;
  });
}

document.addEventListener("DOMContentLoaded", function() {
  textarea.addEventListener("focus", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  textarea.addEventListener("click", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  textarea.addEventListener("input", () => {
    clearTimeout(statusTimeout);
    clearStatus();
    setTextareaVisual();
  });

  sendButton.addEventListener("focus", () => {
    clearTextareaVisual();
  });

  sendButton.addEventListener("mouseover", () => {
    clearTextareaVisual();
  });
});
</script>

</body>
</html>
