<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
}

h1 {
  margin: 30px 0 10px 0;
  font-size: 42px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
}

/* BUTTONS */
a.button {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  font-size: 50px;
  color: white;
  text-decoration: none;
  border-radius: 12px;
  min-height: 120px;
  text-align: center;
}

/* COLORS */
.container a.button:nth-child(1) { background: #1f77b4; }
.container a.button:nth-child(2) { background: #2ca02c; }
.container a.button:nth-child(3) { background: #d62728; }
.container a.button:nth-child(4) { background: #9467bd; }
.container a.button:nth-child(5) { background: #ff7f0e; }

/* MESSAGE PANEL */
.message-panel {
  grid-column: span 2;
  background: #111;
  border: 4px solid #00bcd4;
  border-radius: 12px;
  padding: 30px;
  text-align: left;
}

.message-title {
  color: #00bcd4;
  font-size: 42px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 20px;
}

.message-help {
  color: white;
  font-size: 28px;
  text-align: center;
  margin-bottom: 25px;
}

/* TEXT AREA */
textarea {
  width: 100%;
  box-sizing: border-box;
  font-size: 42px;
  line-height: 1.3;
  padding: 25px;
  border-radius: 12px;
  border: 4px solid #555;
  background: #111;
  color: white;
  min-height: 240px;
  resize: vertical;
  font-family: Arial, sans-serif;
  font-weight: 500;
}

/* BIGGER + THICKER WHEN ACTIVE */
textarea:focus {
  font-size: 56px;
  min-height: 300px;
  background: #222;
  color: white;
  font-weight: 900;
  border: 4px solid #00bcd4;
}

/* PLACEHOLDER */
textarea::placeholder {
  color: #bbb;
}

/* SEND BUTTON */
.submit-button {
  margin-top: 25px;
  width: 100%;
  padding: 30px;
  font-size: 44px;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  background: #00bcd4;
  color: black;
  cursor: pointer;
}

.submit-button:disabled {
  opacity: 0.6;
}

/* STATUS */
#status {
  text-align: center;
  font-size: 40px;
  margin-top: 20px;
  min-height: 50px;
  font-weight: bold;
  transition: opacity 0.5s ease;
}

/* FOCUS / HOVER */
a.button:hover,
a.button:focus,
textarea:focus,
.submit-button:hover,
.submit-button:focus {
  outline: 4px solid yellow;
  outline-offset: 2px;
  filter: brightness(1.1);
}
</style>
</head>
<body>

<h1>Home</h1>

<div class="container">
  <a class="button" href="https://dakboard.com/loop/uuid/69dcebfb-14e487-873c-fa42eb9f9f65">DAK MAIN PHOTOS LOOP</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dacf8a-14e487-cb76-551d2767950e">DAK MAIN PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dcf7fb-14e487-d0d9-b46b5725b21e">DAK LATEST PHOTOS</a>
  <a class="button" href="https://dakboard.com/screen/uuid/69dd4317-14e487-7750-c0bfa2942983">DAK VIDEOS</a>
  <a class="button" href="https://www.youtube.com/playlist?list=PLZkdVGOBHvXOU4aXtZ8892qSg4hZfysZi">YOUTUBE WRESTLING VIDEOS</a>

  <div class="message-panel">
    <div class="message-title">SEND MESSAGE</div>
    <div class="message-help">Click the box, then hold the mic button and speak.</div>

    <form action="https://formspree.io/f/mzdyzybe" method="POST" onsubmit="handleSubmit(event)">
      <textarea name="message" placeholder="Type or speak your message here" required></textarea>

      <input type="hidden" name="_subject" value="Message from Dad's Fire TV">

      <button class="submit-button" type="submit">SEND</button>

      <div id="status"></div>
    </form>
  </div>
</div>

<script>
let statusTimeout;

function handleSubmit(event) {
  event.preventDefault();

  const form = event.target;
  const data = new FormData(form);
  const submitButton = form.querySelector(".submit-button");

  clearTimeout(statusTimeout);
  submitButton.disabled = true;
  showStatus("Sending...", "#ffff66");

  fetch(form.action, {
    method: form.method,
    body: data,
    headers: {
      'Accept': 'application/json'
    }
  })
  .then(() => {
    form.reset();
    showStatus("MESSAGE SENT ✓", "#00ff00");
    submitButton.disabled = false;

    statusTimeout = setTimeout(fadeStatus, 5000);
  })
  .catch(() => {
    showStatus("ERROR SENDING", "red");
    submitButton.disabled = false;
  });
}

function showStatus(text, color) {
  const msg = document.getElementById("status");
  msg.innerText = text;
  msg.style.color = color;
  msg.style.opacity = "1";
}

function fadeStatus() {
  const msg = document.getElementById("status");
  msg.style.opacity = "0";
}

function clearStatus() {
  const msg = document.getElementById("status");
  msg.innerText = "";
  msg.style.opacity = "1";
}

document.addEventListener("DOMContentLoaded", function() {
  const textarea = document.querySelector("textarea");
  if (textarea) {
    textarea.addEventListener("click", clearStatus);
    textarea.addEventListener("input", clearStatus);
  }
});
</script>

</body>
</html>
