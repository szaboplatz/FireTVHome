<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  margin: 0;
}

/* GRID CONTAINER */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 40px;
}

/* BUTTONS */
a {
  display: block;
  padding: 40px;
  font-size: 60px;
  background: #222;
  color: white;
  text-decoration: none;
  border-radius: 12px;
}

/* FOCUS (remote highlight) */
a:focus {
  outline: 4px solid yellow;
  background: #444;
}
</style>
</head>
<body>

<div class="container">
  <a href="#">Lyrics</a>
  <a href="#">Photos</a>
  <a href="#">Videos</a>
  <a href="#">Music</a>
</div>

</body>
</html>
