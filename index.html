body {
  background: black;

  margin: 0;

/* TOP BAR */
.top-status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  padding: 14px 28px;
  background: #111;
  border-bottom: 3px solid #333;
  box-sizing: border-box;
}

.version-label {
  font-size: 22px;
  color: #9aa3aa;
  letter-spacing: 1px;
  white-space: nowrap;
}

.datetime-bar {
  font-size: 28px;
  font-weight: bold;
  color: #d8f6ff;
  text-align: right;
  white-space: nowrap;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  padding: 18px 40px 40px 40px;
}
